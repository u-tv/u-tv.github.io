<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-TV Auto Gallery</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .card { background: #111; border-radius: 8px; overflow: hidden; text-decoration: none; color: #fff; border: 1px solid #333; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { border-color: red; transform: scale(1.05); }
        .card img { width: 100%; height: 210px; object-fit: cover; background: #222; }
        .card span { display: block; padding: 8px; font-size: 12px; font-weight: bold; margin-top: auto; }
        h1 { color: red; text-transform: uppercase; letter-spacing: 1px; }
        #loader { font-size: 18px; color: yellow; margin: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>U-TV Auto Stream</h1>
    <div id="loader">मूवीज लोड हो रही हैं... कृपया रुकें</div>
    <div class="grid" id="movie-grid"></div>

    <script>
        // --- कॉन्फ़िगरेशन ---
        const username = "u-tv"; 
        const repo = "final-update"; 

        const grid = document.getElementById('movie-grid');
        const loader = document.getElementById('loader');

        async function fetchMovies() {
            try {
                // Cloudflare / GitHub Pages दोनों पर सही रूट पाथ सेट करने के लिए
                const isLocalOrCustom = window.location.hostname;
                
                // GitHub API से रूट (main) फोल्डर की फाइलें मंगाना
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                if (!response.ok) throw new Error('API limit or Repo not found');
                
                const files = await response.json();

                loader.style.display = 'none'; 

                let hasMovies = false;

                files.forEach(file => {
                    // सिर्फ .html फाइलें (index.html को छोड़कर) और जो नंबर वाली हों (जैसे 12345.html)
                    if (file.name.endsWith('.html') && file.name !== 'index.html' && !isNaN(file.name.split('.')[0])) {
                        const id = file.name.split('.')[0];
                        hasMovies = true;
                        
                        const card = document.createElement('a');
                        
                        // FIX: चूंकि यह index.html 'Movies/' फोल्डर के अंदर है,
                        // और आपकी मूवी फाइल्स Root (बाहर) में हैं, तो '../filename.html' बिल्कुल सही काम करेगा।
                        card.href = `../${file.name}`; 
                        
                        card.className = 'card';
                        card.innerHTML = `
                            <img src="https://image.tmdb.org/t/p/w342/${id}.jpg" loading="lazy" alt="Poster ${id}" onerror="this.src='https://via.placeholder.com/342x513?text=No+Poster'">
                            <span>Movie ID: ${id}</span>
                        `;
                        grid.appendChild(card);
                    }
                });

                if (!hasMovies) {
                    loader.innerHTML = "कोई मूवी फ़ाइल नहीं मिली।";
                    loader.style.display = 'block';
                }

            } catch (error) {
                loader.innerHTML = "लोड करने में दिक्कत आई। या तो API लिमिट खत्म है या पाथ गलत है।";
                loader.style.color = "red";
                console.error(error);
            }
        }

        fetchMovies();
    </script>
</body>
</html>
