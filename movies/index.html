<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-TV Auto Gallery</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: #111; border-radius: 8px; overflow: hidden; text-decoration: none; color: #fff; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: red; transform: scale(1.05); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card span { display: block; padding: 8px; font-size: 12px; font-weight: bold; }
        h1 { color: red; text-transform: uppercase; }
        #loader { font-size: 20px; color: yellow; margin: 20px; }
    </style>
</head>
<body>

    <h1>U-TV Auto Stream</h1>
    <div id="loader">मूवीज लोड हो रही हैं... कृपया रुकें</div>
    <div class="grid" id="movie-grid"></div>

    <script>
        // --- बस ये 2 चीजें बदलें ---
        const username = "u-tv"; // आपका GitHub यूजरनेम
        const repo = "final-update"; // आपकी रिपोजिटरी का नाम (जो फोटो में दिख रहा है)

        const grid = document.getElementById('movie-grid');
        const loader = document.getElementById('loader');

        async function fetchMovies() {
            try {
                // यह GitHub API से आपकी सभी फाइलों की लिस्ट खुद खींच लेगा
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                const files = await response.json();

                loader.style.display = 'none'; // लोड होने के बाद मैसेज हटा दें

                files.forEach(file => {
                    // सिर्फ उन्हीं फाइलों को उठाएं जो .html हैं और index.html नहीं हैं
                    if (file.name.endsWith('.html') && file.name !== 'index.html' && !isNaN(file.name.split('.')[0])) {
                        const id = file.name.split('.')[0];
                        
                        const card = document.createElement('a');
                        card.href = `../${file.name}`; // मेन फोल्डर की फाइल का लिंक
                        card.className = 'card';
                        card.innerHTML = `
                            <img src="https://image.tmdb.org/t/p/w342/${id}.jpg" loading="lazy" onerror="this.src='https://via.placeholder.com/150x225?text=Poster+Updating'">
                            <span>Movie ID: ${id}</span>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (error) {
                loader.innerHTML = "लोड करने में दिक्कत आई। कृपया पेज रिफ्रेश करें।";
                console.error(error);
            }
        }

        fetchMovies();
    </script>
</body>
</html>
