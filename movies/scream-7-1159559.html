<!DOCTYPE html>
<html lang="hi-IN">
<head>
    <meta name="google-site-verification" content="r4qiBWvH6r8g4r5B7QDJDwdewlm9aCNhUoaNleV1soA" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    
    <title>Scream 7 - Watch Online Free - U-TV</title>
    <meta name="description" content="Watch in HD quality.">
    
    <link rel="canonical" href="https://u-tv.pages.dev/movies/scream-7-1159559.html" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <style>
        :root { --watcho-orange: #ff4f00; --bg-primary: #0a0d11; }
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg-primary); color: white; font-family: system-ui, -apple-system, sans-serif; margin: 0; overflow-x: hidden; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
        
        nav { position: fixed; top: 0; width: 100%; z-index: 50; padding: 10px 15px; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; height: 65px; box-sizing: border-box; }
        .logo-box { display: flex; align-items: center; cursor: pointer; }
        .logo-box h1 { font-family: 'Arial Black', sans-serif; background: linear-gradient(to right, #fff, #ff4f00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem; margin: 0; padding: 0; }
        .search-container { display: flex; gap: 5px; }
        #search { padding: 8px 12px; background: #111; border: 1px solid #333; color: white; font-size: 13px; width: 130px; border-radius: 8px; outline: none; }
        .search-btn { background: var(--watcho-orange); padding: 8px 12px; border-radius: 8px; font-weight: bold; font-size: 11px; cursor: pointer; border: none; color: white; }

        #hero-slider { height: 350px; margin-top: 125px; position: relative; width: 100%; overflow: hidden; background: #000; }
        @media (min-width: 768px) { #hero-slider { height: 550px; margin-top: 110px; } }
        .poster-3d { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease; cursor: pointer; }
        .poster-active { opacity: 1; z-index: 10; }
        
        .filter-nav { position: fixed; top: 65px; width: 100%; z-index: 40; background: rgba(10,13,17,0.98); padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; }
        .server-btn { background: #1a1a1f; border: 1px solid #333; padding: 8px 18px; border-radius: 20px; font-size: 12px; font-weight: 700; color: #eee; cursor: pointer; }
        .server-btn.active { background: var(--watcho-orange); border-color: var(--watcho-orange); }

        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 15px; justify-items: center; }
        @media (min-width: 1024px) { .movie-grid { grid-template-columns: repeat(6, 1fr); } }
        
        .card-container { display: flex; flex-direction: column; gap: 5px; width: 100%; max-width: 180px; }
        .movie-card { border-radius: 12px; overflow: hidden; position: relative; background: #141419; aspect-ratio: 2/3; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-title { position: absolute; bottom: 0; width: 100%; padding: 8px; background: linear-gradient(transparent, black); font-size: 10px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .btn-flex { display: flex; gap: 4px; }
        .btn-action { flex: 1; background: #1a1a1f; border: 1px solid #333; font-size: 8px; font-weight: 900; padding: 6px 2px; border-radius: 6px; text-align: center; cursor: pointer; text-transform: uppercase; }
        .btn-embed { color: #00ff00; border-color: #00ff00; }
        .btn-direct { color: #00ccff; border-color: #00ccff; }

        #playerOverlay { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; overflow-y: auto; }
        iframe { width: 100%; aspect-ratio: 16/9; border: 0; background: #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
    <script src="https://cdn.tailwindcss.com" defer></script>
</head>
<body>

<nav>
    <div class="logo-box" onclick="window.location.href='/'"><h1>U-TV</h1></div>
    <div class="search-container">
        <input type="text" id="search" onkeypress="handleSearch(event)" placeholder="Search Movie...">
        <button onclick="triggerSearch()" class="search-btn">GO</button>
    </div>
</nav>

<div class="filter-nav no-scrollbar">
    <button onclick="filterBy('hi',this)" class="server-btn">🇮🇳 HINDI</button>
    <button onclick="filterBy('en',this)" class="server-btn">🇺🇸 ENG</button>
    <button onclick="filterBy('pa',this)" class="server-btn">🌾 PUN</button>
    <button onclick="filterBy('te',this)" class="server-btn">🔥 SOUTH</button>
    <button onclick="filterBy('movie',this)" class="server-btn active">🎬 MOVIES</button>
    <button onclick="filterBy('tv',this)" class="server-btn">📺 SERIES</button>
</div>

<main id="mainContent">
    <div id="hero-slider"><div id="slider-content" class="w-full h-full relative"></div></div>
    <div class="relative z-10 pb-20 mt-10 px-4">
        <section>
            <h2 class="text-lg font-black mb-4 text-[#ff4f00]">| TRENDING NOW</h2>
            <div id="trendingSlider" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div>
        </section>
        <section class="mt-10">
            <h2 class="text-lg font-black mb-4 text-[#ff4f00]" id="sectionTitle">| POPULAR RELEASES</h2>
            <div id="popularGrid" class="movie-grid"></div>
            <div class="flex justify-center mt-10">
                <button onclick="loadMoreMovies()" class="bg-[#ff4f00] px-10 py-4 rounded-xl font-black text-sm uppercase">Load More Content</button>
            </div>
        </section>
    </div>
</main>

<div id="playerOverlay">
    <div class="p-4 bg-black flex justify-between items-center border-b border-white/10">
        <h3 class="text-[#ff4f00] font-black truncate text-sm uppercase" id="playingTitle">Scream 7</h3>
        <button onclick="closePlayer()" class="text-white text-2xl">✕</button>
    </div>
    <div class="flex gap-2 p-3 overflow-x-auto no-scrollbar bg-[#0d0d0d]" id="serverList"></div>
    <iframe id="mainIframe" src="" allowfullscreen loading="lazy"></iframe>
    <div class="p-5">
        <h2 class="text-xl font-bold text-[#ff4f00]" id="infoName">Scream 7</h2>
        <p class="text-gray-400 text-xs mt-3" id="infoDesc">Watch in HD quality.</p>
    </div>
</div>

<script>
    const API_KEYS = ['5bf61a62fd4647aa7debed7d6f2db079'];
    let currentPage = 1, currentLang = 'movie', currentSlide = 0, isLoading = false;
    let currentMovieID = "1159559";

    window.onload = () => {
        initSite();
        checkAutoPlay();
    };

    async function checkAutoPlay() {
        const path = window.location.pathname;
        const match = path.match(/watch-(\d+)/);
        if (match && match[1]) {
            const mId = match[1];
            const data = await smartApiCall(`/movie/${mId}`);
            if(data.id) playItem(data.id, 'movie', data.title, data.overview);
        } else if (currentMovieID && !currentMovieID.includes("MOVIE_ID")) {
            playItem(currentMovieID, 'movie', "Scream 7", "Watch in HD quality.");
        }
    }

    async function smartApiCall(endpoint) {
        try {
            const res = await fetch(`https://api.themoviedb.org/3${endpoint}${endpoint.includes('?') ? '&' : '?'}api_key=${API_KEYS[0]}`);
            return await res.json();
        } catch (e) { return { results: [] }; }
    }

    async function initSite() {
        const heroData = await smartApiCall('/trending/movie/day');
        if(heroData.results) {
            document.getElementById('slider-content').innerHTML = heroData.results.slice(0, 5).map((m,i)=>`
                <div class="poster-3d ${i===0?'poster-active':''}" id="slide-${i}" onclick="goToMovie('${m.title}', ${m.id})">
                    <img src="https://image.tmdb.org/t/p/original${m.backdrop_path}" class="w-full h-full object-cover brightness-50">
                    <div class="absolute bottom-10 left-6"><h2 class="text-2xl font-black uppercase">${m.title}</h2></div>
                </div>
            `).join('');
            setInterval(() => {
                const active = document.querySelector('.poster-active');
                if(active) active.classList.remove('poster-active');
                currentSlide = (currentSlide+1)%5;
                document.getElementById(`slide-${currentSlide}`)?.classList.add('poster-active');
            }, 4000);
        }
        const trendData = await smartApiCall('/trending/all/week');
        if(trendData.results) document.getElementById('trendingSlider').innerHTML = trendData.results.slice(0,12).map(m=>createCard(m,'w-36 h-52 shrink-0')).join('');
        loadMoreMovies();
    }

    function createCard(m, extraClass='movie-card') {
        const title = (m.title || m.name || 'Untitled').replace(/'/g,"");
        return `
        <div class="card-container">
            <div class="${extraClass}" onclick="goToMovie('${title}', ${m.id})">
                <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" loading="lazy">
                <div class="card-title">${title}</div>
            </div>
            <div class="btn-flex">
                <div class="btn-action btn-embed" onclick="copyAction(event, ${m.id}, 'embed')">Embed</div>
                <div class="btn-action btn-direct" onclick="copyAction(event, ${m.id}, 'direct')">Link</div>
            </div>
        </div>`;
    }

    function copyAction(e, id, type) {
        e.stopPropagation();
        const url = `https://u-tv.pages.dev/movies/watch-${id}.html`;
        const text = (type === 'embed') ? `<iframe src="${url}" width="100%" height="500px" frameborder="0" allowfullscreen></iframe>` : url;
        navigator.clipboard.writeText(text);
        alert(type === 'embed' ? "Embed Code Copied!" : "Direct Link Copied!");
    }

    function goToMovie(title, id) {
        const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
        window.location.href = `/movies/${slug}-${id}.html`;
    }

    async function playItem(id, type, title, overview) {
        document.getElementById('infoName').innerText = title;
        document.getElementById('playingTitle').innerText = title;
        document.getElementById('infoDesc').innerText = overview || "No description available.";
        document.getElementById('playerOverlay').style.display = 'block';
        
        // Final 6 Professional Servers
        const servers = [
            { n: "⭐ SERVER 1", u: `https://vidsrc.me/embed/${type}/${id}` },
            { n: "🚀 SERVER 2", u: `https://vidsrc.to/embed/${type}/${id}` },
            { n: "💎 SERVER 3", u: `https://vidsrc.xyz/embed/${type}/${id}` },
            { n: "🔥 SERVER 4", u: `https://embed.su/embed/${type}/${id}` },
            { n: "⚡ SERVER 5", u: `https://vidlink.pro/embed/${type}/${id}` },
            { n: "🛰️ SERVER 6", u: `https://moviesapi.club/movie/${id}` }
        ];

        document.getElementById('serverList').innerHTML = servers.map((s, i) => 
            `<button class="server-btn ${i===0?'active':''}" onclick="document.getElementById('mainIframe').src='${s.u}'; document.querySelectorAll('#serverList .server-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active')">${s.n}</button>`
        ).join('');
        document.getElementById('mainIframe').src = servers[0].u;
    }

    function closePlayer() {
        if(window.location.pathname.includes('/movies/')) window.location.href = '/';
        else { document.getElementById('playerOverlay').style.display = 'none'; document.getElementById('mainIframe').src = ''; }
    }

    async function loadMoreMovies() {
        if(isLoading) return; isLoading = true;
        const end = currentLang==='movie' ? `/movie/popular?page=${currentPage}` : `/discover/movie?with_original_language=${currentLang}&page=${currentPage}`;
        const data = await smartApiCall(end);
        if(data.results) {
            document.getElementById('popularGrid').innerHTML += data.results.map(m=>createCard(m)).join('');
            currentPage++;
        }
        isLoading = false;
    }

    async function triggerSearch() {
        const q = document.getElementById('search').value;
        if(!q) return;
        const data = await smartApiCall(`/search/multi?query=${encodeURIComponent(q)}`);
        document.getElementById('popularGrid').innerHTML = data.results.filter(m=>m.poster_path).map(m=>createCard(m)).join('');
        document.getElementById('sectionTitle').innerText = `RESULT: ${q.toUpperCase()}`;
    }

    function handleSearch(e) { if(e.key==='Enter') triggerSearch(); }

    function filterBy(l,b) {
        document.querySelectorAll('.filter-nav .server-btn').forEach(btn=>btn.classList.remove('active'));
        b.classList.add('active'); 
        currentLang = l; currentPage = 1;
        document.getElementById('popularGrid').innerHTML = '';
        loadMoreMovies();
    }
</script>
</body>
</html>
