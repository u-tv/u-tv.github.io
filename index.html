<head>

  <!-- Performance: preconnect and prefetch -->

  <link rel="dns-prefetch" href="https://api.themoviedb.org">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      transition: background 0.2s, color 0.2s;
    }
    body.dark {
      background: #050508;
      color: #e2e8f0;
    }
    body.light {
      background: #f8fafc;
      color: #1e293b;
    }
    /* Modern navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      padding: 12px 20px;
      background: rgba(5,5,8,0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(229,9,20,0.6);
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #e50914);
      background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
      white-space: nowrap;
    }
    .nav-right {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-input {
      background: #0e0f16;
      border: 1px solid #2a2a35;
      border-radius: 40px;
      padding: 8px 16px;
      color: white;
      width: 180px;
      outline: none;
      transition: 0.2s;
      font-size: 0.85rem;
    }
    .search-input:focus {
      border-color: #e50914;
      width: 220px;
    }
    body.light .search-input {
      background: white;
      border-color: #cbd5e1;
      color: black;
    }
    .search-btn, .theme-toggle {
      background: #e50914;
      border: none;
      border-radius: 40px;
      padding: 8px 16px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.8rem;
    }
    .theme-toggle {
      background: #334155;
      margin-left: 0;
    }
    body.light .theme-toggle {
      background: #64748b;
    }
    .search-btn:hover, .theme-toggle:hover {
      filter: brightness(0.9);
      transform: scale(0.98);
    }
    /* Horizontal scroll categories (mobile friendly) */
    .categories-wrapper {
      overflow-x: auto;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
      margin: 12px 0 0;
      padding: 0 16px 8px;
    }
    .categories {
      display: flex;
      gap: 12px;
      flex-wrap: nowrap;
    }
    .cat-btn {
      background: #1e1f2a;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      color: #e2e8f0;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
      font-size: 0.85rem;
    }
    body.light .cat-btn {
      background: #e2e8f0;
      color: #1e293b;
    }
    .cat-btn.active {
      background: #e50914;
      color: white;
    }
    /* Trending bar */
    .trending-bar {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      margin: 12px 16px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 12px;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: thin;
      font-size: 0.8rem;
    }
    .trending-label {
      font-weight: bold;
      color: #e50914;
    }
    .trending-item {
      color: white;
      cursor: pointer;
      transition: 0.1s;
    }
    .trending-item:hover {
      color: #e50914;
      text-shadow: 0 0 5px #e50914;
    }
    /* Main container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px;
    }
    .section-title {
      font-size: 1.5rem;
      margin: 24px 0 16px;
      border-left: 4px solid #e50914;
      padding-left: 12px;
    }
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
    }
    .movie-card {
      background: #0e0f16;
      border-radius: 20px;
      overflow: hidden;
      transition: 0.25s;
      cursor: pointer;
      border: 1px solid #1e1f2a;
      position: relative;
    }
    body.light .movie-card {
      background: #ffffff;
      border-color: #e2e8f0;
    }
    .movie-card:hover {
      transform: translateY(-6px);
      border-color: #e50914;
      box-shadow: 0 15px 25px -10px rgba(229,9,20,0.4);
    }
    .movie-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
    }
    .movie-title {
      padding: 10px 8px 5px;
      font-weight: 600;
      text-align: center;
      font-size: 0.85rem;
    }
    .rating {
      padding: 0 8px 10px;
      text-align: center;
      color: #d4af37;
      font-size: 0.7rem;
    }
    .badge-quality {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.7);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: bold;
      background: #e50914;
      color: white;
    }
    .load-more {
      background: #e50914;
      border: none;
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      display: block;
      margin: 32px auto;
      transition: 0.2s;
      font-size: 0.9rem;
    }
    .load-more:hover {
      background: #b00710;
      transform: scale(1.02);
    }
    .ad-container {
      background: #0e0f16;
      margin: 20px 0;
      padding: 12px;
      border-radius: 16px;
      text-align: center;
    }
    .smart-link {
      display: inline-block;
      background: #e50914;
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.9rem;
    }
    .footer {
      background: #0a0a0f;
      text-align: center;
      padding: 24px 16px;
      margin-top: 40px;
      border-top: 1px solid #1e1f2a;
      font-size: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }
    .footer a {
      color: #e50914;
      text-decoration: none;
      margin: 0 5px;
      cursor: pointer;
    }
    /* Responsive improvements */
    @media (max-width: 640px) {
      .navbar {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }
      .nav-right {
        justify-content: space-between;
      }
      .search-input {
        width: 100%;
        max-width: none;
      }
      .search-input:focus {
        width: 100%;
      }
      .movie-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 12px;
      }
      .movie-title {
        font-size: 0.75rem;
      }
      .section-title {
        font-size: 1.3rem;
      }
      .trending-bar {
        font-size: 0.7rem;
        margin: 8px 12px;
      }
      .cat-btn {
        padding: 6px 14px;
        font-size: 0.75rem;
      }
    }
    @media (min-width: 768px) {
      .movie-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 24px;
      }
    }
  </style>
</head>
<body class="dark">
<script data-cfasync="false" src="https://pl28831952.effectivegatecpm.com/08/eb/75/08eb7538aa9646008f732c0721d2a5cc.js" async></script>

<div class="navbar">
  <div class="logo" onclick="location.href='/'">U‑TV</div>
  <div class="nav-right">
    <input type="text" id="globalSearch" class="search-input" placeholder="Search movies, TV shows..." onkeypress="if(event.key==='Enter') globalSearch()">
    <button class="search-btn" onclick="globalSearch()">GO</button>
    <button id="themeToggleBtn" class="theme-toggle">🌙 Dark</button>
  </div>
</div>

<div class="categories-wrapper">
  <div class="categories" id="categoryBar">
    <button class="cat-btn active" data-cat="movie">🎬 Movies</button>
    <button class="cat-btn" data-cat="tv">📺 TV Series</button>
    <button class="cat-btn" data-cat="web">🌐 Web Series</button>
    <button class="cat-btn" data-cat="hindi">🇮🇳 Hindi</button>
    <button class="cat-btn" data-cat="english">🇬🇧 English</button>
    <button class="cat-btn" data-cat="south">🎭 South</button>
  </div>
</div>

<div class="trending-bar" id="trendingBar">
  <span class="trending-label">🔥 TRENDING NOW →</span>
  <div id="trendingList" style="display: inline-flex; gap: 20px;">Loading trends...</div>
</div>

<main class="container">
  <h2 class="section-title" id="sectionTitle">Popular Movies</h2>
  <div id="moviesGrid" class="movie-grid"></div>
  <button id="loadMoreBtn" class="load-more">LOAD MORE</button>
</main>

<div class="ad-container">
  <script async="async" data-cfasync="false" src="https://pl28831952.effectivegatecpm.com/e1fcb13904d27c4fe4e794fb5b4db78d/invoke.js"></script>
  <div id="container-e1fcb13904d27c4fe4e794fb5b4db78d"></div>
</div>

<div class="ad-container">
  <a class="smart-link" href="https://www.effectivegatecpm.com/sa8mca36sv?key=3711015d24018cf89ccb362976c4a2e0" target="_blank" rel="noopener">⚡ High‑Speed Stream Mirror / Download</a>
</div>

<footer class="footer">
  <div>© 2026 U-TV | All content from TMDB | No videos hosted</div>
  <div><a id="dmcaLink">DMCA</a> | <a id="securityLink">Security</a> | <a id="termsLink">Terms & Conditions</a></div>
  <div>DMCA / Report: <a href="mailto:HELP.WOWMOVIES@GMAIL.COM">HELP.WOWMOVIES@GMAIL.COM</a></div>
</footer>

<script>
  // ==================== TMDB API CONFIG ====================
  const TMDB_API_KEYS = [
    '174d0214bf933dd59b3d5ec68a0c967f',
    '5bf61a62fd4647aa7debed7d6f2db079'
  ];
  let currentKeyIndex = 0;
  const BASE_URL = 'https://api.themoviedb.org/3';
  const IMG_BASE = 'https://image.tmdb.org/t/p/w342';

  let currentCategory = 'movie';
  let currentPage = 1;
  let isLoading = false;
  let hasMore = true;
  let currentSearchQuery = null;

  // ==================== FETCH WITH FALLBACK ====================
  async function fetchTMDB(endpoint, params = {}) {
    for (let attempt = 0; attempt < TMDB_API_KEYS.length; attempt++) {
      const key = TMDB_API_KEYS[currentKeyIndex];
      try {
        const url = new URL(`${BASE_URL}${endpoint}`);
        url.searchParams.append('api_key', key);
        url.searchParams.append('language', 'hi-IN');
        for (const [k, v] of Object.entries(params)) if (v) url.searchParams.append(k, v);
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        return data;
      } catch (err) {
        console.warn(`Key ${key.slice(0,8)} failed, switching`);
        currentKeyIndex = (currentKeyIndex + 1) % TMDB_API_KEYS.length;
      }
    }
    throw new Error('All TMDB API keys exhausted');
  }

  // ==================== ENDPOINT HELPER ====================
  function getEndpoint(cat, page) {
    if (currentSearchQuery) return `/search/multi?query=${encodeURIComponent(currentSearchQuery)}&page=${page}`;
    switch(cat) {
      case 'movie': return `/movie/popular?page=${page}`;
      case 'tv': return `/tv/popular?page=${page}`;
      case 'web': return `/tv/popular?page=${page}`;
      case 'hindi': return `/discover/movie?with_original_language=hi&page=${page}`;
      case 'english': return `/discover/movie?with_original_language=en&page=${page}`;
      case 'south': return `/discover/movie?with_original_language=ta%2Cte%2Cml%2Ckn&page=${page}`;
      default: return `/movie/popular?page=${page}`;
    }
  }

  // ==================== UI HELPERS ====================
  function escapeHtml(s) { return s.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[m]); }
  function getQuality(rating) { return rating >= 7 ? 'FULL HD' : rating >= 5 ? 'HD' : 'SD'; }

  function createCard(item) {
    const title = item.title || item.name || 'Untitled';
    const poster = item.poster_path ? IMG_BASE + item.poster_path : 'https://placehold.co/342x513?text=No+Poster';
    const rating = item.vote_average?.toFixed(1) || 'N/A';
    const id = item.id;
    const type = item.media_type || (currentCategory === 'tv' || currentCategory === 'web' ? 'tv' : 'movie');
    const quality = getQuality(parseFloat(item.vote_average));
    return `
      <div class="movie-card" data-id="${id}" data-type="${type}" data-title="${escapeHtml(title)}">
        <div class="badge-quality">${quality}</div>
        <img src="${poster}" alt="${escapeHtml(title)}" loading="lazy">
        <div class="movie-title">${escapeHtml(title)}</div>
        <div class="rating">⭐ ${rating}</div>
      </div>
    `;
  }

  // ==================== LOAD MOVIES ====================
  async function loadMovies(reset = true) {
    if (isLoading) return;
    isLoading = true;
    if (reset) {
      currentPage = 1;
      document.getElementById('moviesGrid').innerHTML = '<div style="text-align:center;padding:50px;">Loading...</div>';
      hasMore = true;
    }
    const endpoint = getEndpoint(currentCategory, currentPage);
    try {
      const data = await fetchTMDB(endpoint);
      let results = data.results || [];
      if (currentCategory === 'web') results = results.filter(r => r.original_language === 'en');
      if (results.length === 0 && currentPage === 1) {
        document.getElementById('moviesGrid').innerHTML = '<div style="text-align:center;padding:50px;">No results found. Showing recommendations.</div>';
        const trendingData = await fetchTMDB('/trending/movie/day', { page: 1 });
        const recResults = trendingData.results || [];
        const html = recResults.slice(0, 20).map(createCard).join('');
        document.getElementById('moviesGrid').innerHTML = html;
        hasMore = false;
        isLoading = false;
        return;
      }
      const html = results.map(createCard).join('');
      if (reset) document.getElementById('moviesGrid').innerHTML = html;
      else document.getElementById('moviesGrid').insertAdjacentHTML('beforeend', html);
      currentPage++;
      hasMore = results.length > 0 && currentPage <= (data.total_pages || 1);
    } catch(e) { console.error(e); }
    isLoading = false;
  }

  // ==================== TRENDING ====================
  async function loadTrending() {
    const data = await fetchTMDB('/trending/movie/day', { page: 1 });
    if (data.results) {
      const trendingDiv = document.getElementById('trendingList');
      trendingDiv.innerHTML = data.results.slice(0,12).map(m => `<span class="trending-item" data-id="${m.id}" data-type="movie">${escapeHtml(m.title)}</span>`).join(' • ');
      document.querySelectorAll('.trending-item').forEach(el => {
        el.onclick = () => { window.location.href = '/' + el.dataset.type + '/' + el.dataset.id + '/'; };
      });
    }
  }

  // ==================== CATEGORY SWITCH ====================
  async function switchCategory(cat) {
    currentCategory = cat;
    currentSearchQuery = null;
    document.getElementById('globalSearch').value = '';
    currentPage = 1;
    const titles = { movie:'Popular Movies', tv:'Popular TV Series', web:'Trending Web Series', hindi:'Hindi Movies', english:'English Movies', south:'South Indian Cinema' };
    document.getElementById('sectionTitle').innerHTML = titles[cat] || 'Movies';
    await loadMovies(true);
    document.querySelectorAll('.cat-btn').forEach(btn => {
      if (btn.dataset.cat === cat) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  // ==================== SEARCH WITH RECOMMENDATIONS ====================
  async function globalSearch() {
    const q = document.getElementById('globalSearch').value.trim();
    if (!q) return;
    currentSearchQuery = q;
    currentCategory = 'movie';
    currentPage = 1;
    document.getElementById('sectionTitle').innerHTML = `🔍 Search: ${q}`;
    await loadMovies(true);
    document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
  }

  // ==================== EVENT LISTENERS ====================
  document.getElementById('loadMoreBtn').onclick = () => {
    if (!isLoading && hasMore) loadMovies(false);
  };

  document.getElementById('moviesGrid').addEventListener('click', (e) => {
    const card = e.target.closest('.movie-card');
    if (card) {
      const id = card.dataset.id;
      const type = card.dataset.type;
      window.location.href = '/' + type + '/' + id + '/';
    }
  });

  // ==================== THEME TOGGLE ====================
  const themeBtn = document.getElementById('themeToggleBtn');
  themeBtn.onclick = () => {
    const isDark = document.body.classList.contains('dark');
    if (isDark) {
      document.body.classList.remove('dark');
      document.body.classList.add('light');
      themeBtn.innerHTML = '🌞 Light';
      localStorage.setItem('theme', 'light');
    } else {
      document.body.classList.remove('light');
      document.body.classList.add('dark');
      themeBtn.innerHTML = '🌙 Dark';
      localStorage.setItem('theme', 'dark');
    }
  };
  if (localStorage.getItem('theme') === 'light') {
    document.body.classList.remove('dark');
    document.body.classList.add('light');
    themeBtn.innerHTML = '🌞 Light';
  }

  // ==================== LEGAL MODALS ====================
  function showLegalModal(title, content) {
    const modalDiv = document.createElement('div');
    modalDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:3000;';
    modalDiv.innerHTML = `<div style="background:#0e0f16;max-width:500px;width:90%;border-radius:24px;padding:24px;"><h2 style="color:#e50914;">${title}</h2><p style="margin:15px 0;">${content}</p><button id="legalClose" style="background:#e50914;border:none;padding:8px 20px;border-radius:40px;color:white;cursor:pointer;">Close</button></div>`;
    document.body.appendChild(modalDiv);
    document.getElementById('legalClose').onclick = () => modalDiv.remove();
  }

  document.getElementById('dmcaLink').onclick = () => showLegalModal('DMCA Notice', 'U-TV respects intellectual property. All video streams are embedded from third‑party sources. If you believe your copyright is infringed, please contact us at HELP.WOWMOVIES@GMAIL.COM. We will respond within 48 hours.');
  document.getElementById('securityLink').onclick = () => showLegalModal('Security Policy', 'We use HTTPS encryption. No personal data is collected.');
  document.getElementById('termsLink').onclick = () => showLegalModal('Terms & Conditions', 'By using U-TV, you agree that we are not responsible for third‑party embedded content. You must be 18+ years old.');

  // ==================== INIT ====================
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => switchCategory(btn.dataset.cat));
  });

  (async () => {
    await loadTrending();
    await switchCategory('movie');
  })();
</script>
</body>
