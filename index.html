    <style>
        :root { --watcho-orange: #ff4f00; --bg-primary: #0a0d11; --card-bg: rgba(20, 20, 25, 0.95); }
        
        /* Fast Rendering Fix */
        body { background: #0a0d11; color: white; font-family: system-ui, -apple-system, sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        
        /* Mobile Navbar Optimization */
        nav { position: fixed; top: 0; width: 100%; z-index: 50; padding: 10px 15px; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; height: 65px; box-sizing: border-box; }
        .logo-box { font-family: 'Arial Black', sans-serif; background: linear-gradient(to right, #fff, #ff4f00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px rgba(255,79,0,0.4)); cursor: pointer; font-size: 1.8rem; margin: 0; }

        /* Multi-Speed Search Box */
        .search-container { display: flex; gap: 5px; flex-grow: 0; }
        #search { padding: 8px 12px; background: #111; border: 1px solid #333; rounded-xl: 10px; color: white; font-size: 13px; width: 130px; outline: none; border-radius: 8px; transition: 0.2s; }
        #search:focus { border-color: var(--watcho-orange); width: 160px; }
        .search-btn { background: var(--watcho-orange); padding: 8px 12px; border-radius: 8px; font-weight: bold; font-size: 11px; cursor: pointer; }

        /* Responsive Hero Slider */
        #hero-slider { height: 350px; margin-top: 125px; position: relative; width: 100%; overflow: hidden; background: #000; }
        @media (min-width: 768px) { #hero-slider { height: 550px; margin-top: 110px; } }
        .poster-3d { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease-in-out; }
        .poster-active { opacity: 1; z-index: 10; }

        /* Filter Nav Optimization */
        .filter-nav { position: fixed; top: 65px; width: 100%; z-index: 40; background: rgba(10,13,17,0.98); padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; box-sizing: border-box; }
        .server-btn { background: #1a1a1f; border: 1px solid #333; padding: 8px 18px; border-radius: 20px; font-size: 12px; font-weight: 700; color: #eee; cursor: pointer; }
        .server-btn.active { background: var(--watcho-orange); border-color: var(--watcho-orange); color: white; }

        /* 100% Mobile Grid (2 Columns) */
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        @media (min-width: 640px) { .movie-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .movie-grid { grid-template-columns: repeat(6, 1fr); gap: 20px; } }
        
        .movie-card { border-radius: 12px; overflow: hidden; position: relative; background: #141419; aspect-ratio: 2/3; border: 1px solid rgba(255,255,255,0.05); }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; loading: lazy; }
        .gold-review { position: absolute; top: 8px; right: 8px; background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; padding: 3px 8px; border-radius: 12px; font-weight: 900; font-size: 10px; z-index: 5; }

        /* No-Scrollbar & Scrollbar Style */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--watcho-orange); border-radius: 10px; }

        /* Full-Screen Mobile Player */
        #playerOverlay { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; overflow-y: auto; }
        iframe { width: 100%; aspect-ratio: 16/9; border: 0; }

        #captcha-overlay { position: fixed; inset: 0; background: #0a0d11; z-index: 1000000; display: flex; align-items: center; justify-content: center; }
        .seo-fallback.hidden { display: none; }
    </style>

    <script src="https://cdn.tailwindcss.com" defer></script>

</head>
<body>

<div id="seo-fallback" class="seo-fallback p-8 text-center">
    <h1 class="text-3xl font-black mb-4">U-TV - Free HD Movie Streaming</h1>
    <p class="text-gray-400 text-sm">Watch 10,000+ Movies & Web Series Free HD. Updated Daily.</p>
</div>

<div id="captcha-overlay">
    <div class="text-center p-6 bg-[#141419] border border-[#ff4f00] rounded-2xl mx-4">
        <h1 class="text-xl font-black text-[#ff4f00] mb-4 uppercase">Verification</h1>
        <div class="cf-turnstile" data-sitekey="0x4AAAAAAACpYk-c9YeKTSuo1" data-callback="onCaptchaSuccess"></div>
    </div>
</div>

<nav>
    <h1 class="logo-box" onclick="location.reload()">U-TV</h1>
    <div class="search-container">
        <input type="text" id="search" onkeypress="handleSearch(event)" placeholder="Search...">
        <button onclick="triggerSearch()" class="search-btn">GO</button>
    </div>
</nav>

<div class="filter-nav no-scrollbar">
    <button onclick="filterBy('hi',this)" class="server-btn">🇮🇳 HINDI</button>
    <button onclick="filterBy('en',this)" class="server-btn">🇺🇸 ENG</button>
    <button onclick="filterBy('pa',this)" class="server-btn">🌾 PUN</button>
    <button onclick="filterBy('te',this)" class="server-btn">🔥 SOUTH</button>
    <button onclick="filterBy('movie',this)" class="server-btn active">🎬 MOVIES</button>
    <button onclick="filterBy('tv',this)" class="server-btn">📺 SERIES</button>
</div>

<div id="hero-slider"><div id="slider-content" class="w-full h-full relative"></div></div>

<div class="relative z-10 pb-20 space-y-8 mt-5">
    <section class="px-4">
        <h2 class="text-lg font-black mb-4 text-[#ff4f00]">| TRENDING</h2>
        <div id="trendingSlider" class="flex gap-4 overflow-x-auto no-scrollbar"></div>
    </section>
    
    <section class="px-4">
        <h2 class="text-lg font-black mb-4 text-[#ff4f00]" id="sectionTitle">| POPULAR MOVIES</h2>
        <div id="popularGrid" class="movie-grid"></div>
        <div class="flex justify-center mt-10">
            <button onclick="loadMoreMovies()" class="bg-[#ff4f00] px-10 py-3 rounded-xl font-black text-sm" id="loadMoreBtn">LOAD MORE</button>
        </div>
    </section>
</div>

<footer class="bg-black/95 p-10 border-t border-white/10 text-center space-y-4">
    <p class="text-gray-500 text-[10px]">U-TV is a search engine for legal public embed links.</p>
    <p class="text-[9px] text-gray-700 tracking-widest">© 2026 U-TV NETWORK</p>
</footer>

<div id="playerOverlay">
    <div class="p-4 bg-black flex justify-between items-center border-b border-white/10">
        <h3 class="text-[#ff4f00] font-black truncate text-sm" id="playingTitle">U-TV PLAYER</h3>
        <button onclick="closePlayer()" class="text-white text-2xl font-bold">✕</button>
    </div>
    <div class="flex gap-2 p-3 overflow-x-auto no-scrollbar bg-[#0d0d0d]" id="serverList"></div>
    <div class="w-full">
        <iframe id="mainIframe" src="" allowfullscreen loading="lazy"></iframe>
    </div>
    <div class="p-5">
        <h2 class="text-xl font-bold text-[#ff4f00]" id="infoName"></h2>
        <p class="text-gray-400 text-xs mt-3 leading-relaxed" id="infoDesc"></p>
    </div>
</div>

<script>
    const API_KEYS = ['174d0214bf933dd59b3d5ec68a0c967f', '5bf61a62fd4647aa7debed7d6f2db079'];
    const REDIRECT_URL = "https://www.effectivegatecpm.com/sa8mca36sv?key=3711015d24018cf89ccb362976c4a2e0"; 
    let currentApiIndex = 0, currentPage = 1, currentLang = 'movie', currentSlide = 0, isLoading = false, redirectShown = false;
    const IMG_URL = 'https://image.tmdb.org/t/p/w500';

    function onCaptchaSuccess() {
        document.getElementById('captcha-overlay').style.display = 'none';
        document.getElementById('seo-fallback').classList.add('hidden');
        initSite();
    }

    async function smartApiCall(endpoint) {
        try {
            const url = `https://api.themoviedb.org/3${endpoint}${endpoint.includes('?') ? '&' : '?'}api_key=${API_KEYS[currentApiIndex]}`;
            const res = await fetch(url);
            return await res.json();
        } catch {
            currentApiIndex = 1 - currentApiIndex;
            const url = `https://api.themoviedb.org/3${endpoint}${endpoint.includes('?') ? '&' : '?'}api_key=${API_KEYS[currentApiIndex]}`;
            const res = await fetch(url);
            return await res.json();
        }
    }

    async function initSite() {
        try {
            const heroData = await smartApiCall('/trending/movie/day');
            document.getElementById('slider-content').innerHTML = heroData.results.slice(0, 5).map((m,i)=>`
                <div class="poster-3d ${i===0?'poster-active':''}" id="slide-${i}" onclick="handleGlobalClick(); playItem('${m.id}','movie','${m.title.replace(/'/g," ")}')">
                    <img src="https://image.tmdb.org/t/p/original${m.backdrop_path}" class="w-full h-full object-cover brightness-50" loading="eager">
                    <div class="absolute bottom-10 left-6"><h2 class="text-2xl font-black uppercase">${m.title}</h2></div>
                </div>
            `).join('');
            
            setInterval(() => {
                document.querySelector('.poster-active')?.classList.remove('poster-active');
                currentSlide = (currentSlide+1)%5;
                document.getElementById(`slide-${currentSlide}`)?.classList.add('poster-active');
            }, 4000);

            const trendData = await smartApiCall('/trending/all/week');
            document.getElementById('trendingSlider').innerHTML = trendData.results.slice(0,10).map(m=>createCard(m,'w-36 h-52 shrink-0')).join('');
            loadMoreMovies();
        } catch(e) {}
    }

    function createCard(m, extraClass='movie-card') {
        const type = m.media_type || (currentLang === 'tv' ? 'tv' : 'movie');
        const encodedData = btoa(unescape(encodeURIComponent(JSON.stringify({id:m.id, type:type, title:m.title||m.name, overview:m.overview}))));
        return `<div class="${extraClass} movie-card" onclick="handleGlobalClick(); playItemFromCard('${encodedData}')">
            <div class="gold-review">${m.vote_average?.toFixed(1) || '0.0'}⭐</div>
            <img src="${IMG_URL+m.poster_path}" loading="lazy">
            <div class="absolute bottom-0 w-full p-2 bg-gradient-to-t from-black text-[10px] font-bold truncate uppercase">${m.title||m.name}</div>
        </div>`;
    }

    async function playItemFromCard(encoded) {
        const data = JSON.parse(decodeURIComponent(escape(atob(encoded))));
        await playItem(data.id, data.type, data.title, data.overview);
    }

    async function playItem(id, type, title = "MOVIE", overview = "") {
        const t = (type === 'tv') ? 'tv' : 'movie';
        document.getElementById('infoName').innerText = title;
        document.getElementById('infoDesc').innerText = overview || "Stream in HD on U-TV.";
        document.getElementById('playingTitle').innerText = title;

        const servers = [
            { n: "HD-1", u: `https://vidsrc.to/embed/${t}/${id}` },
            { n: "HD-2", u: `https://multiembed.mov/?video_id=${id}&tmdb=1` },
            { n: "FAST", u: `https://vidsrc.xyz/embed/${t}/${id}` },
            { n: "PRO", u: `https://vidsrc.pro/embed/${t}/${id}` }
        ];
        
        document.getElementById('serverList').innerHTML = servers.map((s, i) => `<button class="server-btn ${i===0?'active':''}" onclick="changeServer('${s.u}', this)">${s.n}</button>`).join('');
        document.getElementById('mainIframe').src = servers[0].u;
        document.getElementById('playerOverlay').style.display = 'block';
    }

    function handleGlobalClick() { if (!redirectShown) { window.open(REDIRECT_URL, '_blank'); redirectShown = true; } }
    function changeServer(u, b) { document.querySelectorAll('#serverList .server-btn').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); document.getElementById('mainIframe').src = u; }
    function closePlayer() { document.getElementById('playerOverlay').style.display = 'none'; document.getElementById('mainIframe').src = ''; }

    async function triggerSearch() {
        const q = document.getElementById('search').value.trim();
        if(!q) return;
        const data = await smartApiCall(`/search/multi?query=${encodeURIComponent(q)}&page=1`);
        document.getElementById('popularGrid').innerHTML = data.results.filter(m => m.poster_path).map(m=>createCard(m)).join('');
        document.getElementById('sectionTitle').innerText = `SEARCH: ${q.toUpperCase()}`;
    }
    function handleSearch(e) { if(e.key==='Enter') triggerSearch(); }

    async function filterBy(l,b) {
        document.querySelectorAll('.filter-nav .server-btn').forEach(btn=>btn.classList.remove('active'));
        b.classList.add('active');
        currentLang = l; currentPage = 1;
        document.getElementById('popularGrid').innerHTML = '';
        loadMoreMovies();
    }

    async function loadMoreMovies() {
        if(isLoading) return; isLoading = true;
        try {
            const end = currentLang==='movie' ? `/movie/popular?page=${currentPage}` : currentLang==='tv' ? `/tv/popular?page=${currentPage}` : `/discover/movie?with_original_language=${currentLang}&page=${currentPage}`;
            const data = await smartApiCall(end);
            document.getElementById('popularGrid').innerHTML += data.results.map(m=>createCard(m)).join('');
            currentPage++; 
        } catch(e) {}
        isLoading = false;
    }

    window.onload = () => { setTimeout(onCaptchaSuccess, 1000); };
</script>
</body>
</html>
