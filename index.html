<body>

<div class="header">
  <div class="top-flex">
    <div style="display: flex; align-items: center; gap: 12px;">
      <span class="logo">U‑TV HUB</span>
      <div class="live-badge">🔴 LIVE <span id="liveCount">46,732</span></div>
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInput" class="search-input" placeholder="Search movies..." onkeypress="if(event.key==='Enter') triggerSearch()">
      <button class="search-btn" onclick="triggerSearch()">GO</button>
    </div>
  </div>
  <div class="category-row" id="categoryContainer">
    <div class="cat-chip active" data-cat="hindi">🇮🇳 HINDI</div>
    <div class="cat-chip" data-cat="english">🌍 ENGLISH</div>
    <div class="cat-chip" data-cat="punjabi">🟧 PUNJABI</div>
    <div class="cat-chip" data-cat="south">🎭 SOUTH</div>
    <div class="cat-chip" data-cat="movie">🎬 MOVIES</div>
    <div class="cat-chip" data-cat="tv">📺 WEBSERIES</div>
  </div>
</div>

<div class="hero-mini" id="heroContainer"></div>

<div class="section-head">
  <div class="section-title">🔥 TRENDING NOW</div>
</div>
<div id="trendingGrid" class="movie-grid"></div>

<div class="section-head">
  <div class="section-title" id="dynamicTitle">⭐ POPULAR MOVIES</div>
</div>
<div id="moviesGrid" class="movie-grid"></div>
<button id="loadMoreButton" class="load-more-btn">LOAD MORE</button>

<footer>
  <div class="footer-links">
    <a id="aboutUsBtn">About</a> • <a id="dmcaBtn">DMCA</a> • <a id="disclaimerBtn">Disclaimer</a>
  </div>
  <div>© 2026 U-TV HUB | Embedded third‑party streams</div>
  <div style="margin-top: 6px;"><a href="mailto:HELP.WOWMOVIES@GMAIL.COM" style="color:#ea4c23;">HELP.WOWMOVIES@GMAIL.COM</a></div>
</footer>

<script>
  // ---------- dual TMDB key configuration ----------
  const TMDB_KEYS = ['174d0214bf933dd59b3d5ec68a0c967f', '5bf61a62fd4647aa7debed7d6f2db079'];
  let currentKeyIdx = 0;
  const BASE = 'https://api.themoviedb.org/3';
  const IMG_URL = 'https://image.tmdb.org/t/p/w342';
  const BACKDROP_URL = 'https://image.tmdb.org/t/p/w780';

  let activeCategory = 'hindi';
  let pageNumber = 1;
  let isLoadingMore = false;
  let endOfList = false;
  let searchKeyword = null;

  async function tmdbRequest(endpoint, params = {}) {
    for (let attempt = 0; attempt < TMDB_KEYS.length; attempt++) {
      try {
        const url = new URL(BASE + endpoint);
        url.searchParams.append('api_key', TMDB_KEYS[currentKeyIdx]);
        if (!params.language) url.searchParams.append('language', 'hi-IN');
        for (let [k, val] of Object.entries(params)) if (val) url.searchParams.append(k, val);
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('api fail');
        return await resp.json();
      } catch(e) {
        currentKeyIdx = (currentKeyIdx + 1) % TMDB_KEYS.length;
      }
    }
    throw new Error('All TMDB keys exhausted');
  }

  function getEndPoint(cat, page) {
    if (searchKeyword) return `/search/multi?query=${encodeURIComponent(searchKeyword)}&page=${page}`;
    const routes = {
      hindi: `/discover/movie?with_original_language=hi&sort_by=popularity.desc&page=${page}`,
      english: `/discover/movie?with_original_language=en&sort_by=popularity.desc&page=${page}`,
      punjabi: `/discover/movie?with_original_language=pa&sort_by=popularity.desc&page=${page}`,
      south: `/discover/movie?with_original_language=ta%2Cte%2Cml%2Ckn&sort_by=popularity.desc&page=${page}`,
      movie: `/movie/popular?page=${page}`,
      tv: `/tv/popular?page=${page}`
    };
    return routes[cat] || `/movie/popular?page=${page}`;
  }

  function sectionTitle(cat) {
    if (searchKeyword) return `🔍 SEARCH: ${searchKeyword}`;
    const titles = {
      hindi: '🇮🇳 HINDI CINEMA',
      english: '🌍 ENGLISH TOP PICKS',
      punjabi: 'PUNJABI HITS',
      south: 'SOUTH SUPERSTARS',
      movie: '🎬 POPULAR MOVIES',
      tv: '📺 TRENDING WEBSERIES'
    };
    return titles[cat] || 'POPULAR NOW';
  }

  function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }

  function buildMovieCard(m) {
    const title = m.title || m.name || 'Untitled';
    const poster = m.poster_path ? IMG_URL + m.poster_path : 'https://placehold.co/342x513?text=No+Poster';
    const rating = m.vote_average ? m.vote_average.toFixed(1) : '0.0';
    const media = m.media_type || (activeCategory === 'tv' ? 'tv' : 'movie');
    return `<div class="movie-card" data-id="${m.id}" data-type="${media}">
      <div class="poster-area"><img src="${poster}" alt="${escapeHtml(title)}" loading="lazy"><div class="rating-badge">⭐ ${rating}</div></div>
      <div class="movie-title">${escapeHtml(title)}</div>
    </div>`;
  }

  async function loadTrendingSection() {
    try {
      const data = await tmdbRequest('/trending/all/week', { page: 1 });
      if (data.results) {
        const trendItems = data.results.filter(i => i.poster_path).slice(0, 12);
        document.getElementById('trendingGrid').innerHTML = trendItems.map(buildMovieCard).join('');
      }
    } catch(e) {}
  }

  async function loadMainMovies(reset = true) {
    if (isLoadingMore) return;
    isLoadingMore = true;
    if (reset) {
      pageNumber = 1;
      endOfList = false;
      document.getElementById('moviesGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;">⏳ loading...</div>';
    }
    try {
      const apiPath = getEndPoint(activeCategory, pageNumber);
      const result = await tmdbRequest(apiPath);
      let items = result.results || [];
      if (activeCategory === 'south') items = items.filter(i => i.poster_path);
      const html = items.map(buildMovieCard).join('');
      if (reset) document.getElementById('moviesGrid').innerHTML = html;
      else document.getElementById('moviesGrid').insertAdjacentHTML('beforeend', html);
      pageNumber++;
      endOfList = items.length < 18;
    } catch(e) { console.warn(e); }
    isLoadingMore = false;
  }

  async function changeCategory(cat) {
    activeCategory = cat;
    searchKeyword = null;
    document.getElementById('searchInput').value = '';
    document.getElementById('dynamicTitle').innerText = sectionTitle(cat);
    await loadMainMovies(true);
    document.querySelectorAll('.cat-chip').forEach(chip => {
      chip.classList.toggle('active', chip.dataset.cat === cat);
    });
  }

  async function triggerSearch() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    searchKeyword = query;
    activeCategory = 'movie';
    document.getElementById('dynamicTitle').innerHTML = `🔍 SEARCH: ${escapeHtml(query)}`;
    await loadMainMovies(true);
  }

  // HERO carousel minimal
  async function initHero() {
    try {
      const heroData = await tmdbRequest('/trending/movie/day', { page: 1 });
      if (heroData.results) {
        const slides = heroData.results.filter(s => s.backdrop_path).slice(0, 5);
        const container = document.getElementById('heroContainer');
        container.innerHTML = slides.map((s, idx) => `<div class="hero-slide ${idx === 0 ? 'active' : ''}" style="background-image:url('${BACKDROP_URL + s.backdrop_path}');"></div>`).join('');
        container.insertAdjacentHTML('beforeend', '<div class="hero-gradient" style="position:absolute; bottom:0; left:0; right:0; height:50%; background:linear-gradient(to top,#0b0c10,transparent);"></div>');
        let currentSlide = 0;
        setInterval(() => {
          const all = document.querySelectorAll('.hero-slide');
          if (all.length) {
            all[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % all.length;
            all[currentSlide].classList.add('active');
          }
        }, 4800);
      }
    } catch(e) {}
  }

  // handle navigation to movie detail page
  function attachCardListeners() {
    document.querySelectorAll('.movie-card').forEach(card => {
      if (card.getAttribute('data-listener')) return;
      card.setAttribute('data-listener', 'true');
      card.addEventListener('click', (e) => {
        const id = card.dataset.id;
        if (id) window.location.href = `https://u-tv.pages.dev/movie/${id}/`;
      });
    });
  }

  const gridObserver = new MutationObserver(() => attachCardListeners());
  gridObserver.observe(document.getElementById('moviesGrid'), { childList: true, subtree: true });
  gridObserver.observe(document.getElementById('trendingGrid'), { childList: true, subtree: true });

  document.querySelectorAll('.cat-chip').forEach(btn => {
    btn.addEventListener('click', () => changeCategory(btn.dataset.cat));
  });
  document.getElementById('loadMoreButton').onclick = () => { if (!isLoadingMore && !endOfList) loadMainMovies(false); };

  // live viewer random
  setInterval(() => {
    const liveSpan = document.getElementById('liveCount');
    if (liveSpan) liveSpan.innerText = (43000 + Math.floor(Math.random() * 15000)).toLocaleString();
  }, 7000);

  // legal modals clean
  function showInfoModal(title, msg) {
    const d = document.createElement('div');
    d.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:1000;';
    d.innerHTML = `<div style="background:#14151f;max-width:360px;width:90%;border-radius:24px;padding:20px;"><h4 style="color:#ea4c23;margin-bottom:8px;">${title}</h4><p style="color:#cbd5e1;font-size:0.75rem;">${msg}</p><button id="closeModalBtn" style="background:#ea4c23;border:none;margin-top:16px;padding:6px 16px;border-radius:30px;color:white;cursor:pointer;">OK</button></div>`;
    document.body.appendChild(d);
    document.getElementById('closeModalBtn').onclick = () => d.remove();
  }
  document.getElementById('aboutUsBtn').onclick = () => showInfoModal('About U-TV HUB', 'We index third-party streaming embeds. No files hosted. All metadata from TMDB.');
  document.getElementById('dmcaBtn').onclick = () => showInfoModal('DMCA Notice', 'Respect copyright. Takedown requests: HELP.WOWMOVIES@GMAIL.COM');
  document.getElementById('disclaimerBtn').onclick = () => showInfoModal('Disclaimer', 'Streams embedded from external sources. We are not responsible for external content.');

  // initial load
  initHero();
  loadTrendingSection();
  changeCategory('hindi');
  setTimeout(attachCardListeners, 500);
</script>
</body>
</html>
