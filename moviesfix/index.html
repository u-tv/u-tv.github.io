<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-TV | Premium Stream</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #e50914; margin-bottom: 30px; font-size: 28px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .movie-card { background: #111; border-radius: 8px; overflow: hidden; text-decoration: none; color: #fff; border: 1px solid #333; transition: 0.3s; }
        .movie-card:hover { transform: scale(1.05); border-color: #e50914; }
        .movie-card img { width: 100%; height: 210px; object-fit: cover; background: #222; }
        .movie-info { padding: 8px; font-size: 11px; font-weight: bold; }
        #status { font-size: 18px; color: yellow; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>U-TV AUTO STREAM</h1>
    <div id="status">मूवीज जाँची जा रही हैं...</div>
    <div class="movie-grid" id="movie-grid"></div>

    <script>
        // --- 100% Working Config ---
        const gitUser = "u-tv"; 
        const gitRepo = "u-tv.github.io"; 

        async function fetchMovies() {
            const grid = document.getElementById('movie-grid');
            const status = document.getElementById('status');

            try {
                // API Call - Hum Root directory ko check kar rahe hain jahan apki 5000 files hain
                const res = await fetch(`https://api.github.com/repos/${gitUser}/${gitRepo}/contents/`);
                const files = await res.json();

                if (!Array.isArray(files)) {
                    status.innerHTML = "API Limit Hit! Thodi der baad check karein.";
                    return;
                }

                status.style.display = 'none';

                files.forEach(file => {
                    // Sirf movie files (.html) ko uthayega, index.html ko nahi
                    if (file.name.endsWith('.html') && file.name !== 'index.html') {
                        const id = file.name.replace('.html', '');
                        
                        const card = document.createElement('a');
                        card.href = `../${file.name}`; // Ye root ki file se connect karega
                        card.className = 'movie-card';
                        card.innerHTML = `
                            <img src="https://image.tmdb.org/t/p/w342/${id}.jpg" loading="lazy" onerror="this.src='https://via.placeholder.com/342x500?text=Poster+Loading'">
                            <div class="movie-info">MOVIE ID: ${id}</div>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (err) {
                status.innerHTML = "Error: Data fetch nahi ho paya.";
                console.error(err);
            }
        }
        fetchMovies();
    </script>
</body>
</html>
