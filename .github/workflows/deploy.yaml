name: Deploy Next.js to Cloudflare Pages

on:
  push:
    branches:
      - main
      - master # दोनों में से जो भी ब्रांच होगी, यह उसे अपने आप पकड़ लेगा

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Force Clean Old Eleventy Files
        run: |
          rm -rf .eleventy.js eleventy.config.js _site .cache
          echo "Old Eleventy files removed successfully!"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next-on-Pages
        run: npx @cloudflare/next-on-pages
        env:
          NEXT_PUBLIC_TMDB_API_KEY: '174d0214bf933dd59b3d5ec68a0c967f'

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'u-tv'
          directory: '.cloudflare'
