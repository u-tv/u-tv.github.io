name: DailyAutoUpdate
on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC (7:30 AM IST)
  workflow_dispatch:

jobs:
  sync-movies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests --user
          python -m pip cache purge
      
      - name: Run sync script
        run: |
          python sync_movies.py
      
      - name: Check git status
        id: git-status
        run: |
          if git diff --quiet HEAD; then
            echo "status=unchanged" >> $GITHUB_OUTPUT
          else
            echo "status=changed" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.git-status.outputs.status == 'changed'
        run: |
          git config --global user.name "U-TV Bot"
          git config --global user.email "bot@u-tv.pages.dev"
          git add .
          git diff --staged --name-only | head -20
          git commit -m "🤖 Daily sync: $(date +%Y-%m-%d) - Added/updated $(find movies -name '*.html' | wc -l) movie pages" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
