name: Daily Auto Sync Movies

on:
  schedule:
    - cron: '0 3 * * *'  # Rozana subah 3 baje (UTC)
  workflow_dispatch:      # Manual button (check karne ke liye)

permissions:
  contents: write         # Files likhne ke liye permission

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requirements
        run: pip install requests

      - name: Run Script
        run: python sync_movies.py

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🎬 Auto Sync Movies"
          # Isse sari nayi aur purani changed files update ho jayengi
          file_pattern: "movies/*.html sitemap.xml" 
