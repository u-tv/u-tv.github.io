# .github/workflows/sync-movies.yml
name: Daily Auto Sync Movies (sync_movies.py)

on:
  schedule:
    - cron: '0 3 * * *'   # 3:00 AM UTC (daily)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - run: |
          pip install requests
          python sync_movies.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🎬 Synced TMDB movies & sitemap - $(date +%Y-%m-%d)'
          file_pattern: |
            movies/*.html
            sitemap.xml
