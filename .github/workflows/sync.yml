name: Daily Auto Sync Movies

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

# Ye permission sabse zaroori hai push karne ke liye
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    # Agar kisi wajah se sync atak jaye toh 10 min mein cancel ho jaye
    timeout-minutes: 10 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Isse ensure hota hai ki puri history fetch ho aur conflict na aaye
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Baar-baar install hone ki speed badhayega

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Movie Sync Script
        env:
          # Agar koi API key chahiye toh yahan add karein
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }} 
        run: python sync_movies.py

      - name: Check for changes
        id: git-check
        run: |
          git status --porcelain
          echo "changes=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit and Push Changes
        # Ye step sirf tab chalega jab files mein koi badlav (change) hoga
        if: steps.git-check.outputs.changes != '0'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🎬 Auto-sync movies: ${{ github.event.head_commit.timestamp }}"
          # Specific files commit karne ke liye
          file_pattern: 'movies/*.html sitemap.xml'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
