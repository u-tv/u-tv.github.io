# .github/workflows/sync-movies.yml
name: Daily Auto Sync Movies (sync_movies.py)

on:
  schedule:
    - cron: '0 3 * * *'   # 3:00 AM UTC (daily)
  workflow_dispatch:
    inputs:
      manual_run:
        description: 'Manual sync trigger'
        required: true
        default: "true"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run sync script (sync_movies.py)
        run: |
          python sync_movies.py

      - name: Check if files changed
        id: check
        run: |
          if git diff --quiet HEAD; then
            echo "status=unchanged" >> "$GITHUB_OUTPUT"
          else
            echo "status=changed" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit new movies & sitemap
        if: steps.check.outputs.status == 'changed'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: ${{ github.ref }}
          commit_message: "🎬 Synced TMDB movies & sitemap - $(date +%Y-%m-%d)"
          file_pattern: |
            movies/*.html
            sitemap.xml
