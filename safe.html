<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="meta-title">Movie Analysis & Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <nav class="p-4 bg-black shadow-lg">
        <h1 class="text-2xl font-bold text-red-600">CineCritique India</h1>
    </nav>
    <div class="container mx-auto p-6">
        <div id="hero-image" class="w-full h-64 bg-cover bg-center rounded-xl mb-6"></div>
        <h2 id="movie-name" class="text-4xl font-bold mb-4"></h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div id="ai-content" class="text-gray-300 leading-relaxed text-lg">
                लोड हो रहा है...
            </div>
            <div class="bg-gray-800 p-6 rounded-xl">
                <h3 class="text-xl font-semibold mb-4 text-red-500">Official Details</h3>
                <p id="movie-info" class="text-sm space-y-2"></p>
                <div id="ebay-link" class="mt-6"></div>
            </div>
        </div>
    </div>
</body>
</html>
